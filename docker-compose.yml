version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yango
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yango_promo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - yango-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yango -d yango_promo"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-api:
    build:
      context: ./python-api
    environment:
      PYTHON_INTERNAL_SECRET: ${PYTHON_INTERNAL_SECRET}
    networks:
      - yango-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  nextjs:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://yango:${POSTGRES_PASSWORD}@postgres:5432/yango_promo
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      PYTHON_API_URL: http://python-api:8000
      PYTHON_INTERNAL_SECRET: ${PYTHON_INTERNAL_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    networks:
      - yango-net
    depends_on:
      python-api:
        condition: service_healthy
      postgres:
        condition: service_healthy

networks:
  yango-net:
    driver: bridge

volumes:
  pgdata:
